version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shortcut
      POSTGRES_PASSWORD: shortcut_password
      POSTGRES_DB: shortcut_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortcut"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://shortcut:shortcut_password@postgres:5432/shortcut_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Add other required .env variables here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - DATABASE_URL=postgresql://shortcut:shortcut_password@postgres:5432/shortcut_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Worker-specific secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2 # Scale workers horizontally out of the box

volumes:
  postgres_data:
  redis_data:
